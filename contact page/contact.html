<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="contact.css">
</head>

<body>

<section class="contact">

<div class="contact-title">
<h1>Contact Us</h1>
<p>We'd love to hear from you!</p>
</div>

<div class="contact-container">

<!-- left Side -->
<div class="contact-form">

<form id="contactForm">

<label>Your Name</label>
<input type="text" id="name" placeholder="Enter your name">

<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your email">

<label>Message</label>
<textarea id="message" rows="8"
placeholder="Write your message..."></textarea>

<button type="submit">
Send Message
</button>

</form>

</div>

<!-- Right Side -->

<div class="right-section">

<div class="info-card">

<h2>Get in Touch</h2>

<div class="info">

<i class="fa-solid fa-envelope"></i>

<div>
<h4>Email</h4>
<p>hello@traveljournal.com</p>
</div>

</div>

<div class="info">

<i class="fa-solid fa-location-dot"></i>

<div>
<h4>Location</h4>
<p>Mufakose street</p>
</div>

</div>

<h3>Follow Us</h3>

<div class="socials">

<a href="#"><i class="fab fa-facebook"></i></a>

<a href="#"><i class="fab fa-instagram"></i></a>

<a href="#"><i class="fab fa-twitter"></i></a>

<a href="#"><i class="fab fa-youtube"></i></a>

</div>

</div>

<!-- FAQ -->

<div class="faq">

<h2>FAQ</h2>

<div class="faq-item">

<button class="faq-btn">
How can I add a journal entry?
<span>+</span>
</button>

<div class="faq-content">
Simply click the "New Journal" button and start writing.
</div>

</div>

<div class="faq-item">

<button class="faq-btn">
Is this website available offline?
<span>+</span>
</button>

<div class="faq-content">
No. An internet connection is required.
</div>

</div>

<div class="faq-item">

<button class="faq-btn">
Can I delete my journal entries?
<span>+</span>
</button>

<div class="faq-content">
Yes. Open the journal entry and click Delete.
</div>

</div>

</div>

</div>

</div>

</section>

<script src="contact.js"></script>

</body>
</html>
